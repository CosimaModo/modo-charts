<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', Arial, sans-serif; background: white; }
  .chart-wrapper { width: 100%; overflow: hidden; }
  .chart-header { padding: 16px 20px 4px; }
  .chart-title { font-size: 18px; font-weight: 700; color: #1A1A2E; line-height: 1.3; }
  .chart-subtitle { font-size: 13px; color: #8C8CAA; margin-top: 4px; }
  .chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .chart-footer {
    padding: 8px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .chart-source { font-size: 10px; color: #8C8CAA; line-height: 1.5; }
  .chart-notes { font-size: 9px; color: #AAAACC; }
  .chart-logo {
    font-size: 14px;
    font-weight: 700;
    color: #1A1A2E;
    letter-spacing: 4px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="chart-wrapper">
  <div class="chart-header">
    <div class="chart-title">Activity accelerated through 2025, with Q3 and Q4 accounting for two thirds of all deals</div>
    <div class="chart-subtitle">Number of deals</div>
  </div>
  <div class="chart-scroll">
    <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
    <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>
    <div id="dealsbyquarter2025" style="height:380px; min-width:700px;"></div>
    <script type="text/javascript">
      window.PLOTLYENV=window.PLOTLYENV || {};
      if (document.getElementById("dealsbyquarter2025")) {
        Plotly.newPlot("dealsbyquarter2025", [{"hovertemplate": "Project finance: %{y}<extra></extra>", "marker": {"color": "#B8CCE4", "line": {"width": 0}}, "name": "Project finance", "x": ["Q1 2024", "Q1 2025", "Q2 2024", "Q2 2025", "Q3 2024", "Q3 2025", "Q4 2024", "Q4 2025"], "y": [4, 6, 2, 6, 2, 10, 4, 13], "type": "bar"}, {"hovertemplate": "Acquisition: %{y}<extra></extra>", "marker": {"color": "#4472C4", "line": {"width": 0}}, "name": "Acquisition", "x": ["Q1 2024", "Q1 2025", "Q2 2024", "Q2 2025", "Q3 2024", "Q3 2025", "Q4 2024", "Q4 2025"], "y": [2, 1, 2, 1, 1, 3, 6, 12], "type": "bar"}, {"hovertemplate": "Equity investment: %{y}<extra></extra>", "marker": {"color": "#A0A0B8", "line": {"width": 0}}, "name": "Equity investment", "x": ["Q1 2024", "Q1 2025", "Q2 2024", "Q2 2025", "Q3 2024", "Q3 2025", "Q4 2024", "Q4 2025"], "y": [0, 2, 0, 0, 0, 1, 0, 0], "type": "bar"}, {"hovertemplate": "Offtake agreement: %{y}<extra></extra>", "marker": {"color": "#F5D5B0", "line": {"width": 0}}, "name": "Offtake agreement", "x": ["Q1 2024", "Q1 2025", "Q2 2024", "Q2 2025", "Q3 2024", "Q3 2025", "Q4 2024", "Q4 2025"], "y": [1, 1, 1, 3, 0, 1, 0, 6], "type": "bar"}], {"font": {"family": "DM Sans, Arial, sans-serif", "size": 12, "color": "#1A1A2E"}, "legend": {"font": {"size": 11, "color": "#1A1A2E"}, "orientation": "h", "yanchor": "bottom", "y": 1.02, "xanchor": "left", "x": 0.0, "traceorder": "normal", "itemsizing": "constant", "bgcolor": "rgba(0,0,0,0)"}, "hoverlabel": {"font": {"family": "DM Sans, Arial, sans-serif", "size": 13, "color": "white"}, "bgcolor": "#1A1A2E", "bordercolor": "rgba(0,0,0,0)", "namelength": -1}, "paper_bgcolor": "white", "plot_bgcolor": "white", "barmode": "stack", "bargap": 0.25, "xaxis": {"tickfont": {"size": 11, "color": "#1A1A2E"}, "showgrid": false, "showline": false, "tickangle": -45}, "yaxis": {"showgrid": false, "showline": false, "zeroline": false, "showticklabels": false, "range": [0, 35]}, "margin": {"l": 30, "r": 40, "t": 30, "b": 50}, "height": 380, "annotations": [{"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "7", "x": "Q1 2024", "xanchor": "center", "y": 7.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "10", "x": "Q1 2025", "xanchor": "center", "y": 10.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "5", "x": "Q2 2024", "xanchor": "center", "y": 5.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "10", "x": "Q2 2025", "xanchor": "center", "y": 10.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "3", "x": "Q3 2024", "xanchor": "center", "y": 3.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "15", "x": "Q3 2025", "xanchor": "center", "y": 15.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "10", "x": "Q4 2024", "xanchor": "center", "y": 10.5, "yanchor": "bottom"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "31", "x": "Q4 2025", "xanchor": "center", "y": 31.5, "yanchor": "bottom"}]}, {"displayModeBar": false, "displaylogo": false, "responsive": true});
      };
    </script>
  </div>
  <div class="chart-footer">
    <div>
      <div class="chart-source">Source: Modo Energy</div>
      <div class="chart-notes">Notes: Only publicly disclosed transactions are counted.</div>
    </div>
    <div class="chart-logo">MODOENERGY</div>
  </div>
</div>
</body>
</html>
