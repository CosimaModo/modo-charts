ility and Hansa Battery 500 MW BESS Portfolio Acquisition", "sponsor": "Green Flexibility", "country": "Germany", "capacity": "500 MW", "type": "ma", "typeLabel": "M&A", "date": "2025-11-05", "color": "#2F9FC4", "radius": 14.9}, {"lat": 56.4528, "lon": 9.4019, "name": "Kvosted Solar Park BESS Optimisation Deal", "sponsor": "European Energy", "country": "Denmark", "capacity": "N/A", "type": "tolling", "typeLabel": "Offtake", "date": "2025-12-29", "color": "#F5D5B0", "radius": 5.7}, {"lat": 38.3167, "lon": 23.6333, "name": "Elsewedy Electric 50MW/100MWh Greece BESS", "sponsor": "Elsewedy Electric", "country": "Greece", "capacity": "50 MW / 2.0h", "type": "project_finance", "typeLabel": "Project finance", "date": "2025-01-20", "color": "#4472C4", "radius": 5.7}];
        const dealCountryNames = new Set(["United Kingdom", "Germany", "France", "Italy", "Spain", "Netherlands", "Poland", "Finland", "Romania", "Greece", "Denmark", "Lithuania", "Belgium", "Ireland", "Portugal", "Sweden"]);
        
        const width = 800;
        const height = 480;
        
        const projection = d3.geoMercator()
            .center([12, 52])
            .scale(580)
            .translate([width / 2, height / 2]);
        
        const path = d3.geoPath().projection(projection);
        
        const svg = d3.select("#map")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", `0 0 ${width} ${height}`);
        
        // Clip path to hide areas outside the viewport
        svg.append("defs").append("clipPath")
            .attr("id", "map-clip")
            .append("rect")
            .attr("width", width)
            .attr("height", height);
        
        const mapGroup = svg.append("g").attr("clip-path", "url(#map-clip)");
        
        // Ocean background
        mapGroup.append("rect")
            .attr("width", width)
            .attr("height", height)
            .attr("class", "ocean");
        
        const tooltip = d3.select("#tooltip");
        
        // Load TopoJSON
        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(function(world) {
            const countries = topojson.feature(world, world.objects.countries);
            
            // Map numeric IDs to country names using the built-in name properties
            // We'll use a lookup of ISO numeric codes to names
            const numericToName = {
                "826": "United Kingdom", "276": "Germany", "250": "France", 
                "380": "Italy", "724": "Spain", "528": "Netherlands",
                "616": "Poland", "246": "Finland", "642": "Romania",
                "300": "Greece", "208": "Denmark", "440": "Lithuania",
                "056": "Belgium", "372": "Ireland", "620": "Portugal",
                "752": "Sweden", "040": "Austria", "756": "Switzerland",
                "203": "Czech Republic", "703": "Slovakia", "348": "Hungary",
                "191": "Croatia", "705": "Slovenia", "100": "Bulgaria",
                "804": "Ukraine", "112": "Belarus", "498": "Moldova",
                "642": "Romania", "688": "Serbia", "070": "Bosnia and Herzegovina",
                "499": "Montenegro", "807": "North Macedonia", "008": "Albania",
                "578": "Norway", "352": "Iceland", "233": "Estonia",
                "428": "Latvia", "442": "Luxembourg", "470": "Malta",
                "196": "Cyprus", "900": "Kosovo",
            };
            
            // Filter to European countries (roughly lat > 34, lon < 45)
            const europeFeatures = countries.features.filter(f => {
                const centroid = d3.geoCentroid(f);
                return centroid[1] > 34 && centroid[1] < 72 && centroid[0] > -25 && centroid[0] < 45;
            });
            
            // Draw countries
            mapGroup.selectAll(".country")
                .data(europeFeatures)
                .enter().append("path")
                .attr("class", d => {
                    const name = numericToName[d.id] || d.properties?.name || "";
                    return "country " + (dealCountryNames.has(name) ? "country-deal" : "country-no-deal");
                })
                .attr("d", path);
            
            // Draw deal bubbles (sorted so smaller ones are on top)
            const sortedDeals = [...deals].sort((a, b) => b.radius - a.radius);
            
            mapGroup.selectAll(".deal-bubble")
                .data(sortedDeals)
                .enter().append("circle")
                .attr("class", "deal-bubble")
                .attr("cx", d => projection([d.lon, d.lat])[0])
                .attr("cy", d => projection([d.lon, d.lat])[1])
                .attr("r", d => d.radius)
                .attr("fill", d => d.color)
                .attr("opacity", 0.85)
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("opacity", 1).attr("stroke-width", "1.5px");
                    tooltip.style("opacity", 1)
                        .html(`<b>${d.name}</b><br>Developer: ${d.sponsor}<br>Country: ${d.country}<br>Capacity: ${d.capacity}<br>Type: ${d.typeLabel}<br>Date: ${d.date}`);
                })
                .on("mousemove", function(event) {
                    const containerRect = document.querySelector('.container').getBoundingClientRect();
                    const x = event.clientX - containerRect.left;
                    const y = event.clientY - containerRect.top;
                    tooltip.style("left", (x + 15) + "px").style("top", (y - 10) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("opacity", 0.85).attr("stroke-width", "0.6px");
                    tooltip.style("opacity", 0);
                });
        });
    </script>
