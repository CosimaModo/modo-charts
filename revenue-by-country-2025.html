<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', Arial, sans-serif; background: white; }
  .chart-wrapper { width: 100%; overflow: hidden; }
  .chart-header { padding: 16px 20px 4px; }
  .chart-title { font-size: 18px; font-weight: 700; color: #1A1A2E; line-height: 1.3; }
  .chart-subtitle { font-size: 13px; color: #8C8CAA; margin-top: 4px; }
  .chart-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .chart-footer {
    padding: 8px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .chart-source { font-size: 10px; color: #8C8CAA; line-height: 1.5; }
  .chart-notes { font-size: 9px; color: #AAAACC; }
  .chart-logo {
    font-size: 14px;
    font-weight: 700;
    color: #1A1A2E;
    letter-spacing: 4px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="chart-wrapper">

        Plotly.newPlot("revenuebycountry2025", [{"hovertemplate": "Merchant: %{x}<extra></extra>", "marker": {"color": "#B8CCE4", "line": {"width": 0}}, "name": "Merchant", "orientation": "h", "x": [13, 9, 1, 0, 1, 1, 3, 0, 0, 0], "y": ["Germany", "United Kingdom", "Netherlands", "Italy", "Poland", "Finland", "Romania", "Greece", "France", "Other"], "type": "bar"}, {"hovertemplate": "Tolling: %{x}<extra></extra>", "marker": {"color": "#4472C4", "line": {"width": 0}}, "name": "Tolling", "orientation": "h", "x": [7, 3, 1, 0, 0, 2, 0, 0, 1, 0], "y": ["Germany", "United Kingdom", "Netherlands", "Italy", "Poland", "Finland", "Romania", "Greece", "France", "Other"], "type": "bar"}, {"hovertemplate": "Hybrid: %{x}<extra></extra>", "marker": {"color": "#A0A0B8", "line": {"width": 0}}, "name": "Hybrid", "orientation": "h", "x": [2, 3, 3, 1, 2, 0, 0, 1, 0, 1], "y": ["Germany", "United Kingdom", "Netherlands", "Italy", "Poland", "Finland", "Romania", "Greece", "France", "Other"], "type": "bar"}, {"hovertemplate": "Undisclosed: %{x}<extra></extra>", "marker": {"color": "#E0E0E8", "line": {"width": 0}}, "name": "Undisclosed", "orientation": "h", "x": [3, 0, 0, 3, 0, 0, 0, 1, 1, 3], "y": ["Germany", "United Kingdom", "Netherlands", "Italy", "Poland", "Finland", "Romania", "Greece", "France", "Other"], "type": "bar"}], {"font": {"family": "DM Sans, Arial, sans-serif", "size": 12, "color": "#1A1A2E"}, "legend": {"font": {"size": 11, "color": "#1A1A2E"}, "orientation": "h", "yanchor": "bottom", "y": 1.02, "xanchor": "left", "x": 0.0, "traceorder": "normal", "itemsizing": "constant", "bgcolor": "rgba(0,0,0,0)"}, "hoverlabel": {"font": {"family": "DM Sans, Arial, sans-serif", "size": 13, "color": "white"}, "bgcolor": "#1A1A2E", "bordercolor": "rgba(0,0,0,0)", "namelength": -1}, "paper_bgcolor": "white", "plot_bgcolor": "white", "barmode": "stack", "bargap": 0.25, "xaxis": {"showgrid": false, "showline": false, "showticklabels": false, "zeroline": false, "range": [0, 28]}, "yaxis": {"tickfont": {"size": 11, "color": "#1A1A2E"}, "showgrid": false, "showline": false, "automargin": true}, "margin": {"l": 100, "r": 40, "t": 30, "b": 30}, "height": 420, "annotations": [{"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "25", "x": 25.3, "xanchor": "left", "y": "Germany", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "15", "x": 15.3, "xanchor": "left", "y": "United Kingdom", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "5", "x": 5.3, "xanchor": "left", "y": "Netherlands", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "4", "x": 4.3, "xanchor": "left", "y": "Italy", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "3", "x": 3.3, "xanchor": "left", "y": "Poland", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "3", "x": 3.3, "xanchor": "left", "y": "Finland", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "3", "x": 3.3, "xanchor": "left", "y": "Romania", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "2", "x": 2.3, "xanchor": "left", "y": "Greece", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "2", "x": 2.3, "xanchor": "left", "y": "France", "yanchor": "middle"}, {"font": {"color": "#1A1A2E", "family": "DM Sans, Arial, sans-serif", "size": 11}, "showarrow": false, "text": "4", "x": 4.3, "xanchor": "left", "y": "Other", "yanchor": "middle"}]}, {"displayModeBar": false, "displaylogo": false, "responsive": true});
      };

</div>

</html>
